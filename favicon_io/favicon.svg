<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" role="img" aria-label="Freedomind">
  <defs>
    <clipPath id="oct-clip">
      <path d="M 29,0 L 71,0 L 100,29 L 100,71 L 71,100 L 29,100 L 0,71 L 0,29 Z"/>
    </clipPath>
    <linearGradient id="wingL" x1="0" y1="0" x2="1" y2="0.4">
      <stop offset="0%" stop-color="#f8bdce"/>
      <stop offset="100%" stop-color="#eda8bc"/>
    </linearGradient>
    <linearGradient id="wingR" x1="0" y1="0.4" x2="1" y2="0">
      <stop offset="0%" stop-color="#e6294b"/>
      <stop offset="100%" stop-color="#c8193a"/>
    </linearGradient>
  </defs>

  <!-- Bordeaux octagon background -->
  <path
    d="M 29,0 L 71,0 L 100,29 L 100,71 L 71,100 L 29,100 L 0,71 L 0,29 Z"
    fill="#5b0c17"/>

  <!-- Freedomind mark: stylized wings meeting in a V, inside the octagon -->
  <g clip-path="url(#oct-clip)">
    <!-- Left wing: long slender triangle sweeping up-left -->
    <polygon points="14,52 50,58 50,66" fill="url(#wingL)"/>
    <!-- Right wing: long slender triangle sweeping up-right -->
    <polygon points="86,52 50,58 50,66" fill="url(#wingR)"/>
    <!-- Inner V: pink downward triangle -->
    <polygon points="42,60 58,60 50,76" fill="#f8bdce"/>
    <!-- Inner V accent: red on right side of V -->
    <polygon points="50,60 58,60 50,76" fill="#e6294b" opacity="0.85"/>
  </g>
</svg>
