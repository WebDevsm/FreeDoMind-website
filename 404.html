<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Page Not Found — FreeDoMind</title>
  <link rel="icon" type="image/svg+xml" href="favicon_io/favicon.svg">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500&family=Jost:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Jost', sans-serif;
      background: #3d0810;
      color: #fdf6f0;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 2rem;
    }
    .code {
      font-family: 'Cormorant Garamond', serif;
      font-size: clamp(5rem, 15vw, 10rem);
      font-weight: 500;
      letter-spacing: 0.1em;
      color: #f995b3;
      line-height: 1;
    }
    .message {
      font-size: 1.1rem;
      font-weight: 300;
      color: rgba(253,246,228,0.7);
      margin: 1rem 0 2.5rem;
      max-width: 400px;
    }
    .btn {
      display: inline-block;
      padding: 0.85rem 2.5rem;
      background: #e61e2e;
      color: #fff;
      font-family: 'Jost', sans-serif;
      font-size: 0.78rem;
      font-weight: 600;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      text-decoration: none;
      border-radius: 3px;
      transition: background 0.25s ease;
    }
    .btn:hover { background: #c8193a; }
  </style>
</head>
<body>
  <div class="code">404</div>
  <p class="message">The page you're looking for doesn't exist. Let's get you back on track.</p>
  <a class="btn" href="/">Back to FreeDoMind</a>
</body>
</html>
